services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./dtd_schemas:/app/dtd_schemas
      - ./mapping_presets:/app/mapping_presets
      - ./presets:/app/presets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
